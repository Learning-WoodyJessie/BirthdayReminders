name: Daily Birthday & Anniversary Reminders

on:
  schedule:
    - cron: "0 15 * * *"  # 7:00 AM PST (UTC-8) daily
  workflow_dispatch:       # allow manual run from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM:          ${{ secrets.TWILIO_FROM }}
      MY_WHATSAPP:          ${{ secrets.MY_WHATSAPP_NO }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      WARMLY_BASE_URL:      ${{ secrets.WARMLY_BASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets are set
        run: |
          if [ -z "$OPENAI_API_KEY" ];     then echo "ERROR: OPENAI_API_KEY is empty";     exit 1; fi
          if [ -z "$TWILIO_ACCOUNT_SID" ]; then echo "ERROR: TWILIO_ACCOUNT_SID is empty"; exit 1; fi
          if [ -z "$TWILIO_AUTH_TOKEN" ];  then echo "ERROR: TWILIO_AUTH_TOKEN is empty";  exit 1; fi
          if [ -z "$TWILIO_FROM" ];        then echo "ERROR: TWILIO_FROM is empty";        exit 1; fi
          if [ -z "$MY_WHATSAPP" ];        then echo "ERROR: MY_WHATSAPP is empty";        exit 1; fi
          echo "All secrets present ✓"

      - name: Run reminder check
        run: python scripts/check_reminders.py
