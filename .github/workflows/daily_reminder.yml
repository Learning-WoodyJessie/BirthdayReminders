name: Daily Birthday & Anniversary Reminders

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC daily — adjust to your timezone
  workflow_dispatch:       # allow manual run from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  remind:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
      WHATSAPP_ACCESS_TOKEN:    ${{ secrets.WHATSAPP_ACCESS_KEY }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
      MY_WHATSAPP:              ${{ secrets.MY_WHATSAPP_NO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets are set
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then echo "ERROR: OPENAI_API_KEY is empty"; exit 1; fi
          if [ -z "$WHATSAPP_ACCESS_TOKEN" ]; then echo "ERROR: WHATSAPP_ACCESS_TOKEN is empty"; exit 1; fi
          if [ -z "$WHATSAPP_PHONE_NUMBER_ID" ]; then echo "ERROR: WHATSAPP_PHONE_NUMBER_ID is empty"; exit 1; fi
          if [ -z "$MY_WHATSAPP" ]; then echo "ERROR: MY_WHATSAPP is empty"; exit 1; fi
          echo "All secrets present ✓"

      - name: Run reminder check
        run: python scripts/check_reminders.py
