# BirthdayReminders configuration
reminder_days: [3, 0]   # 3 = advance reminder with draft, 0 = day-of wish to copy-paste

# Your WhatsApp number (receives all reminders)
my_whatsapp: "+1XXXXXXXXXX"   # replace with your number in E.164 format e.g. +14155552671

# WhatsApp Cloud API — set these as GitHub Secrets (see README)
# WHATSAPP_ACCESS_TOKEN
# WHATSAPP_PHONE_NUMBER_ID

# Claude API — set as GitHub Secret
# ANTHROPIC_API_KEY
